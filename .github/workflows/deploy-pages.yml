name: Deploy Learning Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/learning-site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务跑，避免并发冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/learning-site/package-lock.json

      - name: Install dependencies
        working-directory: docs/learning-site
        run: npm install

      - name: Build
        working-directory: docs/learning-site
        # CI=true 让 Vite 用 /Vibe-Trading/ 作为 base，适配 GitHub Pages 路径
        env:
          CI: true
        run: npm run build

      - name: Add SPA 404 fallback
        # GitHub Pages 是纯静态托管，刷新子路由会 404。
        # 复制 index.html 为 404.html，让任何未命中路径都回退到 SPA。
        working-directory: docs/learning-site
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/learning-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
